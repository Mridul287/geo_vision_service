<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoVision Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>GeoVision Dashboard</h1>
            <div id="status-banner" class="hidden">Backend is Offline</div>
        </header>

        <main>
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Fetching latest analysis...</p>
            </div>

            <div id="error-container" class="hidden">
                <p>Failed to fetch results.</p>
                <button id="retry-btn">Retry</button>
            </div>

            <section id="result-section" class="card">
                <div class="result-header">
                    <div id="location-name">Waiting for upload...</div>
                    <div id="city-country">Please upload an image via the mobile app</div>
                </div>
                
                <div id="analysis-content" class="hidden">
                    <div class="stats">
                        <div class="coords">
                            Lat: <span id="lat" class="monospace">--</span><br>
                            Lng: <span id="lng" class="monospace">--</span>
                        </div>
                        <div class="confidence">
                            Confidence: <span id="confidence-val">--</span>
                            <div class="meter"><div id="confidence-bar"></div></div>
                        </div>
                    </div>

                    <div id="clues-container" class="clues"></div>
                    <p id="description"></p>
                </div>
            </section>

            <section id="map-section" class="card">
                <div id="map"></div>
            </section>

            <section id="alert-section" class="card">
                <h2>Create Infrastructure Alert</h2>
                <form id="alert-form">
                    <div class="form-group">
                        <label for="asset_type">Asset Type</label>
                        <select id="asset_type" name="asset_type" required>
                            <option value="Bridge">Bridge</option>
                            <option value="Pipe">Pipe</option>
                            <option value="Road">Road</option>
                            <option value="Transformer">Transformer</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="severity">Severity</label>
                        <select id="severity" name="severity" required>
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                            <option value="Critical">Critical</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="alert_description">Description</label>
                        <textarea id="alert_description" name="description" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" name="location" required>
                    </div>

                    <button type="submit" id="submit-alert">Submit Alert</button>
                </form>
                <div id="alert-success" class="hidden">Alert created successfully.</div>
            </section>
        </main>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
